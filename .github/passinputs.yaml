name: Pass inputs
on:
  workflow_dispatch:
    inputs:
      name:
        description: "Enter name"
        required: true
jobs:
  run_Script:
   runs-on: ubuntu-latest
   steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: install python
      uses: actions/setup-python@v4
    - name: run script
      run: python Scripts/passinputs.py "${{ inputs.name }}"
    inputs:
      number1:
        description : "First number"
        default: "0"
        required: true
      number1:
        description : "First number"
        default: "0"
        required: true
env:
  name: "JOhn"
jobs:
  test:
    env:
      school: "Minerva"
    runs-on: ubuntu-latest
    steps:
     - name: job1
       env: 
          class: "seventh"
       run: |  
        echo "$name studying $class standard in $school ${{ vars.projectname }}"
        echo "Actor: ${{ github.actor }}"
        echo "Repo: ${{ github.repository }}"
